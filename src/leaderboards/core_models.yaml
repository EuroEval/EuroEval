# Configuration for the 'core model' list.
#
# The list itself is regenerated by `python -m scripts.update_core_models`,
# which also bumps `last_updated` and updates GitHub issue #1186. This file
# holds the inputs that the generator can't infer from results alone:
# the EU-org regex list, fallback OSAI overrides, and the issue number.
#
# Edit `eu_model_patterns` when a new EU lab releases models — the entries
# are full Python regexes matched against the HuggingFace `org/repo` slug.

issue_number: 1186

# When the updater last ran. ISO-8601 date. The `generate_leaderboards`
# script reads this and prompts the user to refresh the list if it's
# older than 30 days.
last_updated: null

# Regex list seeded from the labels in issue #1186 (🇪🇺). Each pattern is
# matched with `re.search` against the model identifier with any `#suffix`
# stripped. Add a new entry when a new EU lab joins the index.
eu_model_patterns:
  - "^utter-project/"
  - "^EuroBERT/"
  - "^EuropeanParliament/"
  - "^Geotrend/"
  - "^PleIAs/"
  - "^LiquidAI/"
  - "^occiglot/"
  - "^swiss-ai/"
  - "^mistralai/"
  - "^BSC-LT/"
  - "^speakleash/"
  - "^mii-llm/"
  - "^openGPT-X/"
  - "^Aleph-Alpha/"
  - "^vesteinn/(Dansk|Fo|Scandi)BERT"
  - "^answerdotai/ModernBERT"

# Manually-curated top-10 list from osai-index.eu (filtered to text models
# with open base-model weights, training code, and data sources). The
# updater scrapes the live site; this list is used as a fallback when the
# scrape fails (the site is a Nuxt SPA whose bundle filenames rotate,
# so the scrape is best-effort). Refresh manually if it goes stale.
osai_overrides:
  - yulan-team/YuLan-Mini
  - bigscience/bloom
  - allenai/OLMo-2-1124-7B
  - swiss-ai/Apertus-70B-2509
  - HuggingFaceTB/SmolLM3-3B-Base
  - google/mt5-xxl
  - LLM360/Amber
  - EleutherAI/pythia-6.9b
  - EleutherAI/pythia-12b
  - OpenLLM-France/Lucie-7B

# Generated content below this line — do not edit by hand. The updater
# rewrites everything from `models:` downwards. It is committed so that
# the YAML diff matches the GitHub issue diff.
models: []
